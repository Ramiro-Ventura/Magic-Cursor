<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example 2</title>
    <style>
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0c;
            color: white;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;

        }

        h1{

            font-size: 5rem;
        }

        .box{

            width: 60%;
            height: auto;
            aspect-ratio: 16/9;
            background-image: url('../assets/donuts.jpg');
            background-position: center;
            background-size: cover;
            border-radius: 20px;
        }

    </style>
</head>
<body>


    <h1>Donuts</h1>
    <div class="box"></div>
 
    <script src="../magic-cursor.js"></script>

    <script>

        const donutURL = 'https://img.icons8.com/officel/80/doughnut.png';

        const donutImg = new Image();
        donutImg.src = donutURL;

        let cursor = new MagicCursor();

        cursor.onHover({

            selector: '.box',
            cursor: donutURL,
            particles: {
                selector: '.box',
                shape: donutImg,
                baseSize: [15, 25],
                finalSize: [10, 15],
                gravity: 0.05,
                friction: 0.96,
                rotation: [0, 360],
                spin: [-0.05, 0.05],
                speedMultiplier: 2,
                spawnDistance: [40, 50],
                spawnChance: [0.3, 0.7],
                decay: 0.005
            }
        });

    </script>
</body>
</html>
