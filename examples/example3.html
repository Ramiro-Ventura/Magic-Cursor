<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Particle Cursor</title>
    <style>
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0c;
            color: white;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .box{

            width: 500px;
            height: 300px;
            background-position: center;
            background-size: cover;
            transition: 0.45s;
        }

        .box-hover{

            scale: 1.02;
            border-radius: 15px;
        }

        .box-1{

            background-image: url('../assets/resort1.jpg');
        }

        .box-2{

            background-image: url('../assets/resort2.jpg');
        }

        .follower{

            width: 20px;
            height: 20px;
            border-radius: 20px;
            background-color: white;
            transition: width .4s, height .4s;
            margin-left: -10px;
            margin-top: -10px;
        }

        .follower-hover{

            width: 100px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .follower-hover::after{

            content: 'VIEW';
            color: black;
            font-weight: 700;
        }

    </style>
</head>
<body>


    <div class="box box-1"></div>
    <div class="box box-2"></div>

    <div id="follower"></div>
 
    <script src="../cursor.js"></script>

    <script>

        let cursor = new MagicCursor({
            delay: 0.15,
            className: "follower",
        });

        cursor.onHover({

            selector: '.box',
            className: 'follower-hover',
            cursor: '👆',
            onEnter: (element) => element.classList.add('box-hover'),
            onLeave: (element) => element.classList.remove('box-hover')
        });

    </script>
</body>
</html>
