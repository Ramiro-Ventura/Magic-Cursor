<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Fixed Particle Cursor</title>
    <style>
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0c;
            color: white;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .box{

            width: 500px;
            height: 300px;
        }

        .box-1{

            background-color: #0aec61;
        }

        .box-2{

            background-color: rgb(250, 177, 41);
        }

        .follower{

            width: 20px;
            height: 20px;
            border-radius: 20px;
            background-color: white;
            transition: width .4s, height .4s;
            margin-left: -10px;
            margin-top: -10px;
            mix-blend-mode: difference;
        }

        .follower-hover{

            width: 100px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;  
        }

        .follower-hover::after{

            content: 'VIEW';
            color: black;
            font-weight: 700;
        }

    </style>
</head>
<body>


    <div class="box box-1"></div>
    <div class="box box-2"></div>

    <div id="follower"></div>
 
    <script src="cursor.js"></script>

    <script>


        let particleOptions = {

            shape: 'circle',
            colors: 'rainbow',
            hueSpeed: 15,             // Extreme color shifting
            baseSize: 5,
            finalSize: 150,           // They grow into giant blobs
            gravity: -0.05,           // They float up like balloons
            speedMultiplier: 2,
            spawnDistance: 20,
            spawnAmount: 1,
            decay: 0.01,              // Slow fade so the screen gets messy
            lifetime: 20

        };

        let cursor = new Cursor({
            delay: 0.15,
            className: "follower",
            particles: particleOptions
        });

        cursor.onHover({

            selector: '.box-1',
            //className: 'follower-hover',
            particles:{
                shape: { shape1: 'square', shape2: 'circle', shape3: 'triangle'},
                baseSize: [10, 25],
                finalSize: [2, 5],
                colors: ['#00ffcc', '#ff00ff', '#000000'], // Cyan, Magenta, Black
                speedMultiplier: 15, // Big initial explosion
                friction: 0.85,      // They fly fast but stop almost instantly
                rotation: [0, 90],   // Keeps them "grid-aligned"
                spawnDistance: 40,   // Spread out the "glitches"
                spawnAmount: 5,      // Always a cluster
                decay: 0.05          // Fast fade
            }
        });


        const myLogo = new Image();
        myLogo.src = 'https://img.icons8.com/plasticine/100/morty-smith.png'; // Use a transparent PNG

        const myLogo2 = new Image();
        myLogo2.src = 'https://img.icons8.com/plasticine/100/beth-smith.png'; // Use a transparent PNG

        const myLogo3 = new Image();
        myLogo3.src = 'https://img.icons8.com/plasticine/100/summer-smith.png'; // Use a transparent PNG

        const myLogo4 = new Image();
        myLogo4.src = 'https://img.icons8.com/plasticine/100/rick-sanchez.png'; // Use a transparent PNG


        cursor.onHover({
            selector: '.box-2',
            particles: {
                selector: '.box-2',
                shape: {myLogo, myLogo2, myLogo3, myLogo4},            // Using the image object
                baseSize: [15, 25],       // Varied leaf sizes
                finalSize: [10, 15],      // They shrink slightly as they "wither"
                gravity: 0.05,            // Light downward drift
                friction: 0.96,           // Air resistance
                rotation: [0, 360],       // Start at any angle
                spin: [-0.05, 0.05],      // Slow, organic tumbling
                speedMultiplier: 2,       // Thrown slightly by the wind of your mouse
                spawnDistance: 40,        // Only drop a leaf every 40px
                spawnChance: 0.7,         // Occasional skips for realism
                decay: 0.005              // Leaves linger for a long time
            }
        });
